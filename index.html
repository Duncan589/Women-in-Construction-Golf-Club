<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elite Golf Experience</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1f2a;
    color: white;
}

/* NAVBAR */
nav {
    background: #06202b;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

/* HERO */
.hero {
    height: 80vh;
    background-image: url('https://source.unsplash.com/1600x900/?golf-course');
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
}

.hero h1 {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 10px;
}

/* SERVICES */
.services {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 40px;
    gap: 20px;
}

.card {
    width: 300px;
    background: #123;
    border-radius: 10px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card h3 {
    padding: 15px;
}

/* FORM */
.form-section {
    padding: 40px;
    text-align: center;
}

input, textarea {
    width: 80%;
    padding: 10px;
    margin: 10px;
}

button {
    padding: 12px 25px;
    background: gold;
    border: none;
    cursor: pointer;
}

/* FOOTER */
footer {
    background: #06202b;
    padding: 15px;
    text-align: center;
}
</style>

</head>

<body>

<nav>🏌️ Elite Golf Experience</nav>

<section class="hero">
    <h1>Play Like a Pro ⛳</h1>
</section>

<section class="services">

<div class="card">
<img src="https://source.unsplash.com/400x300/?golf,training" alt="Golf Coaching">
<h3>Golf Coaching</h3>
</div>

<div class="card">
<img src="https://source.unsplash.com/400x300/?golf,event" alt="Golf Events">
<h3>Golf Events</h3>
</div>

<div class="card">
<img src="https://source.unsplash.com/400x300/?golf,equipment" alt="Golf Equipment">
<h3>Equipment Hire</h3>
</div>

</section>

<section class="form-section">
<h2>Book a Session</h2>

<form action="https://formspree.io/f/mnjolzlp" method="POST">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<textarea name="message" placeholder="Your Message"></textarea>
<br>
<button type="submit">Submit</button>
</form>

</section>

<footer>
© 2026 Elite Golf Experience
</footer>

</body>
</html>
